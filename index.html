<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Responsive Image Gallery</h1>

    <div class="gallery">
        <img src="https://picsum.photos/id/1015/400/300" alt="Image 1" onclick="openLightbox(0)">
        <img src="https://picsum.photos/id/1016/400/300" alt="Image 2" onclick="openLightbox(1)">
        <img src="https://picsum.photos/id/1018/400/300" alt="Image 3" onclick="openLightbox(2)">
        <img src="https://picsum.photos/id/1020/400/300" alt="Image 4" onclick="openLightbox(3)">
        <img src="https://picsum.photos/id/1024/400/300" alt="Image 5" onclick="openLightbox(4)">
        <img src="https://picsum.photos/id/1035/400/300" alt="Image 6" onclick="openLightbox(5)">
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <button class="prev" onclick="changeImage(-1)">❮</button>
        <img id="lightbox-img" src="">
        <button class="next" onclick="changeImage(1)">❯</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
